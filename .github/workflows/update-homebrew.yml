name: Update Homebrew Formula

on:
  release:
    types: [ published ]

jobs:
  update-formula:
    runs-on: ubuntu-latest

    steps:
      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          DOWNLOAD_BASE="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"

          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            URL="$DOWNLOAD_BASE/km-${target}.tar.gz"
            SHA=$(gh release download "${{ github.ref_name }}" --repo "${{ github.repository }}" --pattern "km-${target}.tar.gz" --output - | sha256sum | cut -d' ' -f1)
            KEY=$(echo "$target" | tr '-' '_')
            echo "url_${KEY}=$URL" >> "$GITHUB_OUTPUT"
            echo "sha_${KEY}=$SHA" >> "$GITHUB_OUTPUT"
          done

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: nikbucher/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PAT }}

      - name: Update formula
        env:
          VERSION: ${{ steps.release.outputs.version }}
          URL_AARCH64_APPLE: ${{ steps.release.outputs.url_aarch64_apple_darwin }}
          SHA_AARCH64_APPLE: ${{ steps.release.outputs.sha_aarch64_apple_darwin }}
          URL_X86_64_APPLE: ${{ steps.release.outputs.url_x86_64_apple_darwin }}
          SHA_X86_64_APPLE: ${{ steps.release.outputs.sha_x86_64_apple_darwin }}
          URL_AARCH64_LINUX: ${{ steps.release.outputs.url_aarch64_unknown_linux_gnu }}
          SHA_AARCH64_LINUX: ${{ steps.release.outputs.sha_aarch64_unknown_linux_gnu }}
          URL_X86_64_LINUX: ${{ steps.release.outputs.url_x86_64_unknown_linux_gnu }}
          SHA_X86_64_LINUX: ${{ steps.release.outputs.sha_x86_64_unknown_linux_gnu }}
        run: |
          cat > Formula/konzertmeister-cli.rb << RUBY
          class KonzertmeisterCli < Formula
            desc "CLI for the Konzertmeister API"
            homepage "https://github.com/nikbucher/konzertmeister-cli"
            version "$VERSION"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "$URL_AARCH64_APPLE"
                sha256 "$SHA_AARCH64_APPLE"
              else
                url "$URL_X86_64_APPLE"
                sha256 "$SHA_X86_64_APPLE"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "$URL_AARCH64_LINUX"
                sha256 "$SHA_AARCH64_LINUX"
              else
                url "$URL_X86_64_LINUX"
                sha256 "$SHA_X86_64_LINUX"
              end
            end

            def install
              bin.install "km"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/km --version")
            end
          end
          RUBY
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/konzertmeister-cli.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/konzertmeister-cli.rb
          git commit -m "feat: update konzertmeister-cli to ${{ steps.release.outputs.version }}"
          git push
